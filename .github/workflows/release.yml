name: Multi-Platform Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # v1.0.0 등 태그 푸시 시 트리거
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: ants 

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ants-linux
            binary_name: ants
          - os: windows-latest
            artifact_name: ants-windows
            binary_name: ants.exe
          - os: macos-latest
            artifact_name: ants-macos
            binary_name: ants

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      # 1. 리눅스 환경에서 Bevy 빌드 필수 라이브러리 설치
      - name: Install Bevy dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev

      # 2. Rust 툴체인 설정
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 3. 빌드 속도 향상을 위한 Rust 캐시 설정
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # 4. 테스트 실행 (Main 브랜치/PR 시 무결성 확인)
      - name: Run tests
        run: cargo test --verbose

      # 5. 릴리스용 바이너리 빌드
      - name: Build release binary
        run: cargo build --release

      # 6. 바이너리와 에셋을 함께 패키징 (각 OS별 압축)
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p release_pkg
          # 바이너리 복사
          cp target/release/${{ matrix.binary_name }} release_pkg/
          # 에셋 폴더 복사
          cp -r assets release_pkg/
          
          # 압축 (Linux/macOS는 zip, Windows도 zip 사용을 위해 bash shell 활용)
          cd release_pkg
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a ../${{ matrix.artifact_name }}.zip .
          else
            zip -r ../${{ matrix.artifact_name }}.zip .
          fi
          cd ..

      # 7. 워크플로우 내 아티팩트로 임시 보관 (Release job에서 한 번에 업로드하기 위함)
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Check downloaded files
        run: ls -R

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ants-linux/ants-linux.zip
            ants-windows/ants-windows.zip
            ants-macos/ants-macos.zip
          body: "Automated multi-platform release for version ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
